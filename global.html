<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📌 全球商品策略持倉看板</title>
    <link rel="canonical" href="https://stock-chart.dominic-cks.workers.dev/global.html" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery.tablesorter/2.31.3/css/theme.bootstrap_4.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.tablesorter/2.31.3/js/jquery.tablesorter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.tablesorter/2.31.3/js/extras/jquery.tablesorter.widgets.min.js"></script>
    
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 30px 20px;
        }
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --stock-red: #ef5350;
            --stock-green: #26a69a;
            --border-color: #e2e8f0;
        }
        .dashboard-header {
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .dashboard-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a252f;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        /* 導覽按鈕靠最右側與外觀美化 */
        .header-nav-btn {
            text-decoration: none;
            background-color: #3b82f6;
            color: white !important;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
        }
        .header-nav-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }

        /* 自訂 Tabs 樣式與仿造修正 */
        .nav-tabs-custom {
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 20px;
            gap: 5px;
        }
        .nav-tabs-custom .nav-link {
            color: var(--text-muted);
            border: 1px solid transparent;
            border-radius: 8px 8px 0 0;
            font-weight: 600;
            padding: 10px 20px;
            font-size: 15px;
            transition: all 0.2s ease;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-tabs-custom .nav-link:hover {
            background-color: #cbd5e1;
            color: var(--text-main);
            border-color: transparent;
        }
        .nav-tabs-custom .nav-link.active {
            color: #2563eb;
            background-color: var(--card-bg);
            border-color: var(--border-color) var(--border-color) var(--card-bg);
            border-width: 2px 2px 0 2px;
            position: relative;
            margin-bottom: -2px;
        }

        .card-custom {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0 0 12px 12px;
            border-top: none;
            box-shadow: 0 4px 6px rgba(148, 163, 184, 0.05);
            margin-bottom: 30px;
            overflow: hidden;
        }
        .table-responsive {
            padding: 20px;
        }
        .table {
            margin-bottom: 0;
            vertical-align: middle;
        }
        .table thead th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
            padding: 14px 10px;
            cursor: pointer;
            position: relative;
        }
        .table thead th.tablesorter-headerAsc::after {
            content: " ▲";
            font-size: 10px;
            color: var(--stock-red);
            position: absolute;
            right: 4px;
        }
        .table thead th.tablesorter-headerDesc::after {
            content: " ▼";
            font-size: 10px;
            color: var(--stock-green);
            position: absolute;
            right: 4px;
        }
        .table tbody tr {
            border-bottom: 1px solid #f1f5f9;
            transition: background-color 0.2s ease;
        }
        .table tbody tr:hover {
            background-color: #f8fafc;
        }
        .table tbody td {
            padding: 14px 10px;
            font-size: 14px;
        }
        .symbol-link {
            text-decoration: none;
            display: flex;
        }
        .symbol-text {
            font-weight: 700;
            color: #3b82f6;
        }
        .symbol-name-text {
            color: var(--text-muted);
        }
        .symbol-link:hover .symbol-text {
            text-decoration: underline;
            color: #1d4ed8;
        }
        .timeframe-badge {
            background-color: #eff6ff;
            color: #2563eb;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }
        .pnl-positive {
            color: var(--stock-red);
            font-weight: 700;
        }
        .pnl-negative {
            color: var(--stock-green);
            font-weight: 700;
        }
        .badge-count {
            background-color: #f1f5f9;
            color: #64748b;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 500;
        }
        #loading-div {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            font-size: 16px;
            color: var(--text-muted);
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <header class="dashboard-header">
        <div class="dashboard-title">
            <span>📊 全球商品多策略自動化持倉看板</span>
        </div>
        <a href="global_chart.html" class="header-nav-btn">📊 進入完整 K 線圖看板 ➔</a>
    </header>

    <div id="loading-div">
        <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
        <span>正在載入最新全球商品持倉清單與市場行情...</span>
    </div>

    <div id="main-content-area" style="display: none;">
        <ul class="nav nav-tabs nav-tabs-custom" id="strategyTabs" role="tablist">
            <li class="nav-item" role="presentation" id="tab-commodity-li" style="display: none;">
                <button class="nav-link active" id="commodity-tab" data-bs-toggle="tab" data-bs-target="#commodity-pane" type="button" role="tab" aria-controls="commodity-pane" aria-selected="true">
                    🪙 貴金屬與商品 <span class="badge-count" id="commodity-count">0 檔</span>
                </button>
            </li>
            </ul>

        <div class="tab-content" id="strategyTabsContent">
            <div class="tab-pane fade show active" id="commodity-pane" role="tabpanel" aria-labelledby="commodity-tab" tabindex="0">
                <div class="card card-custom">
                    <div class="table-responsive">
                        <table class="table" id="commodity-table">
                            <thead>
                                <tr>
                                    <th style="width: 20%;">商品代碼 / 名稱</th>
                                    <th style="width: 12%;">交易週期</th>
                                    <th style="width: 13%;">持倉起日</th>
                                    <th style="width: 12%;">進場價</th>
                                    <th style="width: 13%;">最新日期</th>
                                    <th style="width: 12%;">最新收盤價</th>
                                    <th style="width: 13%;">波段未實現價差</th>
                                    <th style="width: 10%;">未平倉天數</th>
                                </tr>
                            </thead>
                            <tbody id="commodity-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 計算日期間隔天數的輔助函數
    function calculateDaysBetween(dateStr1, dateStr2) {
        if (!dateStr1 || !dateStr2) return '--';
        const d1 = new Date(dateStr1);
        const d2 = new Date(dateStr2);
        if (!isNaN(d1.getTime()) && !isNaN(d2.getTime())) {
            const diffTime = Math.abs(d2 - d1);
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }
        return '--';
    }

    async function loadPositions() {
        try {
            // 1. 同步讀取 全球商品基本清單 (Merge 母檔案)
            const resMaster = await fetch('GLOBAL/list/stocklist.csv');
            if (!resMaster.ok) throw new Error('無法取得全球商品母清單 GLOBAL/list/stocklist.csv');
            const txtMaster = await resMaster.text();
            
            const masterMap = {};
            const linesMaster = txtMaster.split(/\r?\n/);
            for (let i = 1; i < linesMaster.length; i++) {
                if (!linesMaster[i].trim()) continue;
                const cols = linesMaster[i].split(',');
                if (cols.length >= 2) {
                    const sym = cols[0].trim();
                    masterMap[sym] = {
                        name: cols[1].trim(),
                        asset_type: cols[2] ? cols[2].trim() : 'commodity'
                    };
                }
            }

            // 2. 同步讀取 全球未平倉部位清單
            const resPos = await fetch('GLOBAL/list/unclosed_positions.csv');
            if (!resPos.ok) throw new Error('無法取得全球持倉清單 GLOBAL/list/unclosed_positions.csv');
            const txtPos = await resPos.text();

            const commodityList = [];

            const linesPos = txtPos.split(/\r?\n/);
            for (let i = 1; i < linesPos.length; i++) {
                if (!linesPos[i].trim()) continue;
                const cols = linesPos[i].split(',');
                if (cols.length >= 6) {
                    const symbol = cols[0].trim();
                    const timeframe = cols[1].trim();
                    const in_date = cols[2].trim();
                    const entry_close = parseFloat(cols[3]);
                    const latest_date = cols[4].trim();
                    const latest_close = parseFloat(cols[5]);

                    // 動態 Merge 清單名稱，查不到則預設顯示 '全球商品'
                    const meta = masterMap[symbol] || { name: '全球商品', asset_type: 'commodity' };
                    const item = { symbol, timeframe, in_date, entry_close, latest_date, latest_close, name: meta.name };

                    // 依據類別分流 (目前皆為 commodity)
                    if (meta.asset_type === 'commodity' || true) {
                        commodityList.push(item);
                    }
                }
            }

            // 隱藏加載提示，顯示主內容區
            document.getElementById('loading-div').style.display = 'none';
            document.getElementById('main-content-area').style.display = 'block';

            let firstActiveTabId = '';

            // 3. 檢查並渲染商品表格
            if (commodityList.length > 0) {
                document.getElementById('tab-commodity-li').style.display = 'block';
                document.getElementById('commodity-count').innerText = `${commodityList.length} 檔`;
                renderTableRows('commodity-tbody', commodityList);
                if (!firstActiveTabId) firstActiveTabId = 'commodity-tab';
            }

            // 自動設定第一個有資料的 Tab 為選取狀態
            if (firstActiveTabId) {
                $('.nav-tabs-custom .nav-link').removeClass('active');
                $('.tab-content .tab-pane').removeClass('show active');
                
                const $targetTab = $('#' + firstActiveTabId);
                $targetTab.addClass('active');
                $($targetTab.data('bs-target')).addClass('show active');
            }

            // 4. 初始化與更新排序機制
            initAndTriggerTableSorter();

        } catch (err) {
            document.getElementById('loading-div').innerHTML = `<span style="color: red; font-weight: bold;">⚠️ 載入錯誤: ${err.message}</span>`;
            console.error(err);
        }
    }

    // 核心渲染 HTML 函數：精準套用代號/名稱水平並排與加大加粗修飾
    function renderTableRows(tbodyId, dataList) {
        const tbody = document.getElementById(tbodyId);
        tbody.innerHTML = '';
        dataList.forEach(item => {
            const tr = document.createElement('tr');
            const pnl = item.latest_close - item.entry_close;
            let pnlClass = '';
            let pnlSign = '';

            if (pnl > 0) {
                pnlClass = 'pnl-positive';
                pnlSign = '+';
            } else if (pnl < 0) {
                pnlClass = 'pnl-negative';
            }

            const unclosedDays = calculateDaysBetween(item.in_date, item.latest_date);

            // 精準整合套用：水平並排、間距8px、16px字體與粗體深色修飾
            tr.innerHTML = `
                <td>
                    <a href="global_chart.html?symbol=${item.symbol}" class="symbol-link" title="點擊查看 ${item.symbol} ${item.name} 的完整 K 線回測行情" style="flex-direction: row; align-items: center; gap: 8px;">
                        <span class="symbol-text" style="font-size: 16px;">${item.symbol}</span>
                        <span class="symbol-name-text" style="font-size: 16px; font-weight: 700; color: #2c3e50; margin-top: 0;">${item.name}</span>
                    </a>
                </td>
                <td><span class="timeframe-badge">${item.timeframe}</span></td>
                <td style="font-weight: 600; color: #2c3e50;">${item.in_date}</td>
                <td>$${item.entry_close.toFixed(2)}</td>
                <td style="color: var(--text-muted);">${item.latest_date}</td>
                <td style="font-weight: 600;">$${item.latest_close.toFixed(2)}</td>
                <td><span class="${pnlClass}">${pnlSign}${isNaN(pnl) ? '--' : pnl.toFixed(2)}</span></td>
                <td style="font-weight: 600; color: #475569;">${unclosedDays} 天</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 表格自動動態排序
    function initAndTriggerTableSorter() {
        const sorterConfig = {
            theme: 'bootstrap_4',
            sortList: [[2, 1]], // 預設依第三欄 (持倉起日) 進行降序排序
            headers: { 
                0: { sorter: 'text' }, 
                1: { sorter: 'text' }, 
                2: { sorter: 'date' }, 
                3: { sorter: 'digit' }, 
                4: { sorter: 'date' }, 
                5: { sorter: 'digit' }, 
                6: { sorter: 'digit' },
                7: { sorter: 'digit' }
            }
        };

        ['#commodity-table'].forEach(tableId => {
            const $table = $(tableId);
            if ($table.length && $table.find('tbody tr').length > 0) {
                if (!$table.data('tablesorter')) {
                    $table.tablesorter(sorterConfig);
                } else {
                    $table.trigger('update');
                }
            }
        });
    }

    $(document).ready(function() {
        loadPositions();
    });
</script>

</body>
</html>
