<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略持倉管理看板</title>
	<link rel="canonical" href="https://stock-chart.dominic-cks.workers.dev/" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        :root { --sidebar-width: 260px; --header-height: 60px; }
        body { background-color: #f8f9fa; overflow: hidden; }
        #sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; left: 0; top: 0; background: #ffffff; border-right: 1px solid #e9ecef; z-index: 1000; transition: all 0.3s; }
        #sidebar.active { margin-left: calc(-1 * var(--sidebar-width)); }
        #main-content { margin-left: var(--sidebar-width); height: 100vh; display: flex; flex-direction: column; transition: all 0.3s; }
        #main-content.active { margin-left: 0; }
        /* Iframe 填滿剩餘空間 */
        #content-frame { width: 100%; height: calc(100vh - var(--header-height)); border: none; }
        .nav-link { color: #4a5568; font-weight: 500; cursor: pointer; }
        .nav-link:hover, .nav-link.active { color: #0d6efd; background: #eef2ff; }
        @media (max-width: 992px) {
            #sidebar { margin-left: calc(-1 * var(--sidebar-width)); }
            #sidebar.show { margin-left: 0; }
            #main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

<nav id="sidebar" class="d-flex flex-column p-3">
    <div class="h3 text-primary mb-4 px-2">🚀 策略看板</div>
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
            <a class="nav-link active" onclick="loadPage('taiwan.html', this)">
                <i class="ti ti-chart-line me-2"></i>台股策略持倉
            </a>
        </li>
        <li>
            <a class="nav-link" onclick="loadPage('global.html', this)">
                <i class="ti ti-world me-2"></i>全球商品策略
            </a>
        </li>
    </ul>
</nav>

<main id="main-content">
    <header class="navbar navbar-light bg-white border-bottom px-4" style="height: var(--header-height);">
        <button class="btn btn-outline-secondary btn-sm" onclick="toggleSidebar()">
            <i class="ti ti-menu-2"></i>
        </button>
        <div class="fw-bold ms-3" id="page-title">台股策略持倉看板</div>
    </header>

    <!-- 顯示目標頁面的容器 -->
    <iframe id="content-frame" src="taiwan.html"></iframe>
</main>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('main-content').classList.toggle('active');
    }

    function loadPage(url, element) {
        // 更新 iframe 內容
        document.getElementById('content-frame').src = url;
        
        // 更新標題
        document.getElementById('page-title').innerText = element.innerText.trim() + '看板';

        // 更新 Active 樣式
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
    }
</script>
</body>
</html>
