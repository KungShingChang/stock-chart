<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>0050 策略回測看盤看板 (GitHub Pages 測試版)</title>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f5f7f9; }
        .info-panel { margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid #0052cc; }
        .info-title { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .info-desc { font-size: 14px; color: #666; }
        #chart { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 15px; height: 600px; }
    </style>
</head>
<body>

    <div class="info-panel">
        <div class="info-title">📊 0050.TW 歷史 K 線與策略進出場訊號</div>
        <div class="info-desc">本網頁為純前端靜態版，已修正日期的自動對齊防呆機制（支援自動補零與時區格式化）。</div>
    </div>

    <div id="chart"></div>

    <script>
        // 💡 日期標準化精準防呆函式：不論是 "2005/12/9" 還是 "2005-12-09" 統一輸出標準 "2005-12-09"
        function formatDateStandard(rawDate) {
            if (!rawDate) return null;
            const d = new Date(rawDate);
            if (isNaN(d.getTime())) return null; // 排除無效日期
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 1. 初始化 TradingView Chart 圖表
        const chartContainer = document.getElementById('chart');
        const chart = LightweightCharts.createChart(chartContainer, {
            width: chartContainer.clientWidth,
            height: 550,
            layout: { backgroundColor: '#ffffff', textColor: '#333' },
            grid: { vertLines: { color: '#f0f3fa' }, horzLines: { color: '#f0f3fa' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#dfe5eb' },
            timeScale: { borderColor: '#dfe5eb', timeVisible: false },
        });

        const candlestickSeries = chart.addCandlestickSeries({
            upColor: '#ef5350', downColor: '#26a69a',
            borderUpColor: '#ef5350', borderDownColor: '#26a69a',
            wickUpColor: '#ef5350', wickDownColor: '#26a69a',
        });

        const volumeSeries = chart.addHistogramSeries({
            priceFormat: { type: 'volume' },
            priceScaleId: '', 
            scaleMargins: { top: 0.8, bottom: 0 },
        });

        let activeTradeLines = [];

        // 🚀 核心：同時讀取股價檔與交易明細檔
        Promise.all([
            fetch('0050.TW.csv').then(res => { if (!res.ok) throw new Error('找不到 0050.TW.csv'); return res.text(); }),
            fetch('0050_trade_details.csv').then(res => { if (!res.ok) throw new Error('找不到 0050_trade_details.csv'); return res.text(); })
        ])
        .then(([csvKline, csvTrade]) => {
            
            // 【第一階段：解析 0050.TW.csv】
            Papa.parse(csvKline, {
                header: true,
                skipEmptyLines: true,
                complete: function(klineResults) {
                    const klineData = [];
                    const volumeData = [];
                    const availableDatesSet = new Set(); // 改用 Set 提高查詢效能
                    
                    klineResults.data.forEach(row => {
                        const rawDate = row.Date || row.DATE;
                        const formattedDate = formatDateStandard(rawDate);
                        if (!formattedDate) return;
                        
                        const open = parseFloat(row.Open || row.OPEN);
                        const high = parseFloat(row.High || row.HIGH);
                        const low = parseFloat(row.Low || row.LOW);
                        const close = parseFloat(row.Close || row.CLOSE);
                        const volume = parseInt(row.Volume || row.VOLUME, 10) || 0;

                        if (!isNaN(open) && !isNaN(high) && !isNaN(low) && !isNaN(close)) {
                            klineData.push({ time: formattedDate, open: open, high: high, low: low, close: close });
                            volumeData.push({ time: formattedDate, value: volume, color: close >= open ? 'rgba(239, 83, 80, 0.4)' : 'rgba(38, 166, 154, 0.4)' });
                            availableDatesSet.add(formattedDate);
                        }
                    });

                    klineData.sort((a, b) => new Date(a.time) - new Date(b.time));
                    candlestickSeries.setData(klineData);
                    volumeSeries.setData(volumeData);

                    // 【第二階段：解析 0050_trade_details.csv 交易明細】
                    Papa.parse(csvTrade, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(tradeResults) {
                            const markers = [];

                            activeTradeLines.forEach(line => chart.removeSeries(line));
                            activeTradeLines = [];

                            tradeResults.data.forEach(row => {
                                // 將交易紀錄的日期也進行標準化 ISO 對齊
                                const inDate = formatDateStandard(row.In_Date);
                                const outDate = formatDateStandard(row.Out_Date);
                                const inPrice = parseFloat(row.In_Price);
                                const outPrice = parseFloat(row.Out_Price);

                                // A. 繪製買入箭頭
                                if (inDate && !isNaN(inPrice) && availableDatesSet.has(inDate)) {
                                    markers.push({
                                        time: inDate,
                                        position: 'belowBar',
                                        color: '#2196F3',
                                        shape: 'arrowUp',
                                        text: `B: ${inPrice}`,
                                    });
                                }

                                // B. 繪製賣出箭頭與虛線
                                if (outDate && !isNaN(outPrice) && availableDatesSet.has(outDate)) {
                                    markers.push({
                                        time: outDate,
                                        position: 'aboveBar',
                                        color: '#ef5350',
                                        shape: 'arrowDown',
                                        text: `S: ${outPrice}`,
                                    });

                                    // C. 雙重防呆：確保進出場日期皆存在於 K 線時間軸內，才連虛線
                                    if (inDate && availableDatesSet.has(inDate)) {
                                        const tradeLine = chart.addLineSeries({
                                            color: '#78909c',
                                            lineWidth: 1,
                                            lineStyle: LightweightCharts.LineStyle.Dashed,
                                            crosshairMarkerVisible: false,
                                            lastValueVisible: false,
                                            priceLineVisible: false,
                                        });

                                        tradeLine.setData([
                                            { time: inDate, value: inPrice },
                                            { time: outDate, value: outPrice }
                                        ]);
                                        activeTradeLines.push(tradeLine);
                                    }
                                }
                            });

                            markers.sort((a, b) => new Date(a.time) - new Date(b.time));
                            candlestickSeries.setMarkers(markers);
                        }
                    });

                    chart.timeScale().fitContent();
                }
            });
        })
        .catch(err => {
            console.error("載入 CSV 失敗：", err);
            alert("讀取 CSV 檔案失敗，請檢查檔案名稱與路徑。");
        });

        window.addEventListener('resize', () => {
            chart.resize(chartContainer.clientWidth, 550);
        });
    </script>
</body>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>📊 台股 K 線圖篩選看板 (純淨聚焦版)</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background-color: #f4f6f9; color: #333; }
        .filter-container { margin-bottom: 20px; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .filter-group { display: inline-block; margin-right: 20px; margin-bottom: 10px; }
        label { font-weight: bold; margin-right: 8px; color: #4f5d73; }
        select { padding: 8px 12px; border-radius: 4px; border: 1px solid #c8ced3; font-size: 14px; min-width: 180px; background-color: #fff; }
        #chart { background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 15px; min-height: 500px; display: flex; align-items: center; justify-content: center; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-left: 10px; }
        .status-unclosed { background-color: #ffeeba; color: #856404; }
        .status-normal { background-color: #d4edda; color: #155724; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h2>📊 台股歷史 K 線看板 <span id="loadStatus" class="loading">(資料載入中...)</span></h2>

    <div class="filter-container">
        <div class="filter-group">
            <label for="securityType">市場/類型：</label>
            <select id="securityType"><option value="ALL">全部類型</option></select>
        </div>
        <div class="filter-group">
            <label for="industryType">產業類別：</label>
            <select id="industryType"><option value="ALL">全部產業</option></select>
        </div>
        <div class="filter-group">
            <label for="stockSelect">選擇個股：</label>
            <select id="stockSelect"><option value="">-- 請選擇股票 --</option></select>
            <span id="unclosedBadge"></span>
        </div>
    </div>

    <div id="chart">
        <div style="color: #999;">請從上方選單選擇股票以顯示圖表</div>
    </div>

    <script>
        let stockMasterList = [];       
        let unclosedPositions = new Set(); 
        let chart = null, candleSeries = null, activeTradeLines = [];      

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
            if (lines.length === 0) return [];
            const headers = lines[0].split(',').map(h => h.replace(/^["']|["']$/g, '').trim());
            
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const currentLine = lines[i].split(',');
                if (!currentLine || currentLine.length !== headers.length) continue;
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    obj[headers[j]] = currentLine[j].replace(/^["']|["']$/g, '').trim();
                }
                result.push(obj);
            }
            return result;
        }

        async function initSystem() {
            try {
                const unclosedRes = await fetch('list/unclosed_positions.csv').catch(() => null);
                if (unclosedRes && unclosedRes.ok) {
                    parseCSV(await unclosedRes.text()).forEach(item => {
                        if (item.symbol) unclosedPositions.add(item.symbol.trim());
                    });
                }

                const response = await fetch('list/stocklist.csv');
                if (!response.ok) throw new Error("無法讀取 list/stocklist.csv");
                
                stockMasterList = parseCSV(await response.text());
                populateFilters();
                
                document.getElementById('loadStatus').innerText = " (已連線本地 CSV 資料源)";
                document.getElementById('loadStatus').classList.remove('loading');

                document.getElementById('securityType').addEventListener('change', filterStocks);
                document.getElementById('industryType').addEventListener('change', filterStocks);
                document.getElementById('stockSelect').addEventListener('change', onStockChanged);

                if (stockMasterList.length > 0) onStockChanged();

            } catch (error) {
                document.getElementById('chart').innerHTML = `<div style="color:red;font-weight:bold;">⚠️ 系統初始化失敗: ${error.message}</div>`;
            }
        }

        function populateFilters() {
            const secTypes = new Set(), indTypes = new Set();
            stockMasterList.forEach(stock => {
                if (stock.security_type) secTypes.add(stock.security_type);
                if (stock.industry_type) indTypes.add(stock.industry_type);
            });
            const secSelect = document.getElementById('securityType');
            secTypes.forEach(t => { const opt = document.createElement('option'); opt.value = t; opt.innerText = t; secSelect.appendChild(opt); });
            const indSelect = document.getElementById('industryType');
            indTypes.forEach(t => { const opt = document.createElement('option'); opt.value = t; opt.innerText = t; indSelect.appendChild(opt); });
            filterStocks();
        }

        function filterStocks() {
            const selectedSec = document.getElementById('securityType').value;
            const selectedInd = document.getElementById('industryType').value;
            const stockSelect = document.getElementById('stockSelect');
            const currentSelected = stockSelect.value;
            stockSelect.innerHTML = '';

            const filtered = stockMasterList.filter(stock => 
                (selectedSec === 'ALL' || stock.security_type === selectedSec) &&
                (selectedInd === 'ALL' || stock.industry_type === selectedInd)
            );

            filtered.forEach(stock => {
                const opt = document.createElement('option');
                opt.value = stock.symbol;
                opt.innerText = `${stock.symbol} ${stock.symbol_name || ''}${unclosedPositions.has(stock.symbol) ? " 📌 (持倉中)" : ""}`;
                stockSelect.appendChild(opt);
            });

            if (filtered.some(s => s.symbol === currentSelected)) stockSelect.value = currentSelected;
            else if (filtered.length > 0) { stockSelect.value = filtered[0].symbol; onStockChanged(); }
        }

        async function onStockChanged() {
            const symbol = document.getElementById('stockSelect').value;
            if (!symbol) return;

            document.getElementById('unclosedBadge').innerHTML = unclosedPositions.has(symbol) ? 
                `<span class="status-badge status-unclosed">策略持倉中</span>` : `<span class="status-badge status-normal">未持有/已平倉</span>`;

            try {
                const [tradeRes, indRes] = await Promise.all([
                    fetch(`trade/${symbol}_trade.csv`).catch(() => null),
                    fetch(`indicator/${symbol}_indicator.csv`).catch(() => null)
                ]);

                if (!tradeRes || !tradeRes.ok) {
                    document.getElementById('chart').innerHTML = `<div style="color:#666;">⚠️ 找不到 [${symbol}] 的回測行情檔案。</div>`;
                    return;
                }

                renderChart(parseCSV(await tradeRes.text()), indRes && indRes.ok ? parseCSV(await indRes.text()) : []);
            } catch (err) {
                document.getElementById('chart').innerHTML = `<div style="color:red;">錯誤: ${err.message}</div>`;
            }
        }

        function renderChart(tradeData, indicatorData) {
            const chartContainer = document.getElementById('chart');
            chartContainer.innerHTML = '';
            activeTradeLines = [];

            chart = LightweightCharts.createChart(chartContainer, {
                width: chartContainer.clientWidth, height: 500,
                layout: { background: { color: '#ffffff' }, textColor: '#333333' },
                grid: { vertLines: { color: '#f0f3fa' }, horzLines: { color: '#f0f3fa' } },
                timeScale: { borderColor: '#dfdfdf', barSpacing: 10 }
            });

            candleSeries = chart.addCandlestickSeries({ 
                upColor: '#ef5350', downColor: '#26a69a', 
                borderUpColor: '#ef5350', borderDownColor: '#26a69a', 
                wickUpColor: '#ef5350', wickDownColor: '#26a69a' 
            });

            const klines = [], priceMap = new Map();

            tradeData.forEach(row => {
                const t = row.date, o = parseFloat(row.open), h = parseFloat(row.high), l = parseFloat(row.low), c = parseFloat(row.close);
                if (!t || isNaN(o)) return;
                klines.push({ time: t, open: o, high: h, low: l, close: c });
                priceMap.set(t, c);
            });

            candleSeries.setData(klines);

            const markers = [];
            indicatorData.forEach(trade => {
                const indate = trade.in_date, outdate = trade.out_date;
                const inPrice = priceMap.get(indate), outPrice = priceMap.get(outdate);
                if (!inPrice) return;

                markers.push({ time: indate, position: 'belowBar', color: '#26a69a', shape: 'arrowUp', text: `B: ${inPrice}` });
                if (outdate && outPrice) {
                    markers.push({ time: outdate, position: 'aboveBar', color: '#ef5350', shape: 'arrowDown', text: `S: ${outPrice}` });
                    const line = chart.addLineSeries({ color: '#78909c', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, crosshairMarkerVisible: false, lastValueVisible: false, priceLineVisible: false });
                    line.setData([{ time: indate, value: inPrice }, { time: outdate, value: outPrice }]);
                    activeTradeLines.push(line);
                }
            });

            markers.sort((a, b) => new Date(a.time) - new Date(b.time));
            candleSeries.setMarkers(markers);
            chart.timeScale().fitContent();
        }

        window.onload = initSystem;
    </script>
</body>
