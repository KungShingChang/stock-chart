<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台</title>
    <link rel="canonical" href="https://stock-chart.dominic-cks.workers.dev/backend" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        :root { 
            --sidebar-width: 260px; 
            --header-height: 60px; 
            --primary-dark: #1e293b;
            --hover-bg: #f1f5f9;
        }
        body { background-color: #f8f9fa; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* 側邊欄基礎樣式 */
        #sidebar { 
            width: var(--sidebar-width); 
            height: 100vh; 
            position: fixed; 
            left: 0; 
            top: 0; 
            background: #ffffff; 
            border-right: 1px solid #e9ecef; 
            z-index: 1000; 
            transition: all 0.3s; 
            display: flex;
            flex-direction: column;
        }
        
        /* 側邊欄 RWD 機制 */
        @media (max-width: 992px) {
            #sidebar { margin-left: calc(-1 * var(--sidebar-width)); }
            #sidebar.show { margin-left: 0; }
            #main-content { margin-left: 0 !important; width: 100% !important; }
        }
        
        #sidebar.active { margin-left: calc(-1 * var(--sidebar-width)); }
        #main-content { margin-left: var(--sidebar-width); height: 100vh; display: flex; flex-direction: column; transition: all 0.3s; }
        #main-content.active { margin-left: 0; }
        
        .sidebar-brand {
            height: var(--header-height);
            display: flex;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid #e9ecef;
            background-color: #fff;
        }

        /* 兩階層選單美化 */
        .menu-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px 0;
        }
        
        /* 第一階選單按鈕 */
        .nav-first-level {
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 12px 20px;
            color: var(--primary-dark);
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
        }
        .nav-first-level:hover {
            background-color: var(--hover-bg);
        }
        .nav-first-level .menu-title {
            display: flex;
            align-items: center;
        }
        .nav-first-level .arrow-icon {
            transition: transform 0.2s;
            font-size: 14px;
            color: #94a3b8;
        }
        .nav-first-level[aria-expanded="true"] .arrow-icon {
            transform: rotate(180deg);
            color: #2563eb;
        }

        /* 第二階選單項目 */
        .second-level-container {
            background-color: #f8fafc;
            padding: 5px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .nav-second-level {
            display: flex;
            align-items: center;
            padding: 9px 20px 9px 45px;
            color: #475569;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-second-level:hover {
            color: #1e293b;
            background-color: #e2e8f0;
        }
        .nav-second-level.active {
            color: #2563eb;
            background-color: #dbeafe;
            font-weight: 600;
            border-right: 4px solid #2563eb;
        }

        #content-frame { width: 100%; flex: 1; border: none; background: #f4f6f9; }
    </style>
</head>
<body>

<nav id="sidebar">
    <div class="sidebar-brand">
        <h5 class="m-0 fw-bold text-dark d-flex align-items-center">
            <i class="h3 text-primary mb-4 px-2"></i>🚀 管理後台
        </h5>
    </div>
    
    <div class="menu-container">
        <div class="menu-group">
            <button class="nav-first-level" type="button" data-bs-toggle="collapse" data-bs-target="#twStrategyMenu" aria-expanded="true">
                <span class="menu-title"><i class="ti ti-chart-line me-2 text-secondary"></i>模型開發文件</span>
                <i class="ti ti-chevron-down arrow-icon"></i>
            </button>
            <div class="collapse show" id="twStrategyMenu">
                <div class="second-level-container">
                    <a class="nav-second-level active" onclick="loadPage('tw_developement.html', '模型開發文件 ➔ 台股模型開發清單', this)">
                        <i class="ti ti-circle-dot me-2 fs-6"></i>台股模型開發清單
                    </a>
                    <a class="nav-second-level" onclick="loadPage('hk_developement.html', '模型開發文件 ➔ 港股模型開發清單', this)">
                        <i class="ti ti-circle-check me-2 fs-6"></i>港股模型開發清單
                    </a>
					<a class="nav-second-level" onclick="loadPage('global_developement.html', '模型開發文件 ➔ Global模型開發清單', this)">
                        <i class="ti ti-circle-check me-2 fs-6"></i>Global模型開發清單
                    </a>
                </div>
            </div>
        </div>
		
		<div class="menu-group mt-2">
            <button class="nav-first-level" type="button" data-bs-toggle="collapse" data-bs-target="#globalStrategyMenu" aria-expanded="false">
                <span class="menu-title"><i class="ti ti-world me-2 text-secondary"></i>每日批次log監控</span>
                <i class="ti ti-chevron-down arrow-icon"></i>
            </button>
            <div class="collapse" id="globalStrategyMenu">
                <div class="second-level-container">
                    <a class="nav-second-level" onclick="loadPage('log_viewer.html', '每日批次log監控 ➔ log清單', this)">
                        <i class="ti ti-circle-dot me-2 fs-6"></i>log清單
                    </a>
                </div>
            </div>
        </div>
		
    </div>
</nav>

<main id="main-content">
    <header class="navbar navbar-light bg-white border-bottom px-4" style="height: var(--header-height);">
        <button class="btn btn-outline-secondary btn-sm" onclick="toggleSidebar()">
            <i class="ti ti-menu-2"></i>
        </button>
        <div class="fw-bold ms-3 text-secondary" id="page-title">模型開發文件 ➔ 台股模型開發清單</div>
    </header>

    <iframe id="content-frame" src="tw_developement.html"></iframe>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        
        if (window.innerWidth <= 992) {
            // 手機版：切換 show 類別以滑入/滑出側邊欄
            sidebar.classList.toggle('show');
        } else {
            // 電腦版：縮排主區塊
            sidebar.classList.toggle('active');
            mainContent.classList.toggle('active');
        }
    }

    function loadPage(url, displayTitle, element) {
        // 1. 更新 iframe 的 src 載入目標網頁
        document.getElementById('content-frame').src = url;
        
        // 2. 更新頂部導覽列的標題文字
        document.getElementById('page-title').innerText = displayTitle;
        
        // 3. 移除所有二階選單的 active 高亮狀態，並為當前點擊項目加上高亮
        document.querySelectorAll('.nav-second-level').forEach(el => {
            el.classList.remove('active');
        });
        element.classList.add('active');
        
        // 4. 手機模式自動優化：點擊功能後，自動隱藏左側選單，避免擋住主畫面
        if (window.innerWidth <= 992) {
            document.getElementById('sidebar').classList.remove('show');
        }
    }
</script>

</body>
</html>
