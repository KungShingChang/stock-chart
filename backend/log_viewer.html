<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統日誌中心</title>
    <style>
        :root { --bg: #1e1e1e; --panel: #252526; --text: #d4d4d4; --accent: #007acc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; }
        .controls { background: var(--panel); padding: 20px; border-radius: 8px; display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 20px; }
        select, input, button { padding: 10px; border-radius: 4px; border: 1px solid #444; background: #3c3c3c; color: white; }
        button { background: var(--accent); cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #005f9e; }
        #logOutput { background: #000; padding: 15px; border-radius: 8px; white-space: pre-wrap; font-family: 'Consolas', monospace; font-size: 13px; height: 65vh; overflow-y: auto; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 系統日誌監控</h2>
    <div class="controls">
        <select id="fileSelect">
            <option value="hk_daily_quote.log">hk_daily_quote.log</option>
            <option value="hk_industry_update.log">hk_industry_update.log</option>
            <option value="hk_stocklist_manage.log">hk_stocklist_manage.log</option>
            <option value="tw_daily_quote.log">tw_daily_quote.log</option>
            <option value="tw_indicator_generate.log">tw_indicator_generate.log</option>
            <option value="tw_isin_sync.log">tw_isin_sync.log</option>
			<option value="export_TWSE_index.log">export_TWSE_index.log</option>
			<option value="tw_twsedailyquote_index.log">tw_twsedailyquote_index.log</option>
			<option value="export_Global_FX.log">export_Global_FX.log</option>
			<option value="global_FX_quote.log">global_FX_quote.log</option>
        </select>
        <button onclick="loadLog()">讀取最新日誌</button>
        <input type="text" id="filter" placeholder="搜尋關鍵字 (例如: ERROR, SUCCESS)..." oninput="filterLog()">
    </div>
    <div id="logOutput">請選擇上方檔案並點擊讀取...</div>
</div>

<script>
    const GIST_ID = "27dfc82817174a39a586b5152172f85f";
    let rawLog = "";

    async function loadLog() {
        const fileName = document.getElementById('fileSelect').value;
        const output = document.getElementById('logOutput');
        output.textContent = "載入中...";

        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`);
            const data = await response.json();
            
            if (data.files && data.files[fileName]) {
                rawLog = data.files[fileName].content;
                output.textContent = rawLog;
            } else {
                output.textContent = `❌ 錯誤：找不到檔案 ${fileName}`;
            }
        } catch (err) {
            output.textContent = "❌ 讀取失敗: " + err.message;
        }
    }

    function filterLog() {
        const keyword = document.getElementById('filter').value.toLowerCase();
        const lines = rawLog.split('\n');
        const filtered = lines.filter(line => line.toLowerCase().includes(keyword));
        document.getElementById('logOutput').textContent = filtered.length > 0 ? filtered.join('\n') : "找不到符合條件的日誌...";
    }
</script>
</body>
</html>
