<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 台股策略持倉看板</title>
    <link rel="canonical" href="https://stock-chart.dominic-cks.workers.dev/taiwan.html" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery.tablesorter/2.31.3/css/theme.bootstrap_4.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.tablesorter/2.31.3/js/jquery.tablesorter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.tablesorter/2.31.3/js/extras/jquery.tablesorter.widgets.min.js"></script>
    
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 30px 20px;
        }
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --stock-red: #ef5350;
            --stock-green: #26a69a;
            --border-color: #e2e8f0;
        }
        .dashboard-header {
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }
        .dashboard-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a252f;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-custom {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(148, 163, 184, 0.05);
            margin-bottom: 30px;
            overflow: hidden;
        }
        .card-header-custom {
            background-color: #ffffff;
            border-bottom: 1px solid var(--border-color);
            padding: 18px 24px;
            font-size: 18px;
            font-weight: 600;
            color: #34495e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
		.header-nav-btn {
            background-color: #ffffff;
            color: var(--primary-accent);
            border: 1px solid var(--primary-accent);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .table-responsive {
            padding: 10px 20px 20px 20px;
        }
        .table {
            margin-bottom: 0;
            vertical-align: middle;
        }
        .table thead th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
            padding: 14px 10px;
            cursor: pointer;
            position: relative;
        }
        /* Tablesorter 排序箭头美化强化 */
        .table thead th.tablesorter-headerAsc::after {
            content: " ▲";
            font-size: 10px;
            color: var(--stock-red);
            position: absolute;
            right: 4px;
        }
        .table thead th.tablesorter-headerDesc::after {
            content: " ▼";
            font-size: 10px;
            color: var(--stock-green);
            position: absolute;
            right: 4px;
        }
        .table tbody tr {
            border-bottom: 1px solid #f1f5f9;
            transition: background-color 0.2s ease;
        }
        .table tbody tr:hover {
            background-color: #f8fafc;
        }
        .table tbody td {
            padding: 14px 10px;
            font-size: 14px;
        }
        .symbol-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
        }
        .symbol-text {
            font-weight: 700;
            color: #3b82f6;
        }
        .symbol-name-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .symbol-link:hover .symbol-text {
            text-decoration: underline;
            color: #1d4ed8;
        }
        .timeframe-badge {
            background-color: #eff6ff;
            color: #2563eb;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }
        .pnl-positive {
            color: var(--stock-red);
            font-weight: 700;
        }
        .pnl-negative {
            color: var(--stock-green);
            font-weight: 700;
        }
        .badge-count {
            background-color: #f1f5f9;
            color: #64748b;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        #loading-div {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            font-size: 16px;
            color: var(--text-muted);
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <header class="dashboard-header">
        <div class="dashboard-title">
            <span>📊 台股策略自動化持倉看板</span>
			<a href="tw_chart.html" class="header-nav-btn">📊 進入完整 K 線圖看板 ➔</a>
        </div>
    </header>

    <div id="loading-div">
        <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
        <span>正在載入最新策略持倉清單與市場行情...</span>
    </div>

    <div class="card card-custom" id="stock-card" style="display: none;">
        <div class="card-header-custom">
            <span>🏢 普通股持倉狀態</span>
            <span class="badge-count" id="stock-count">0 檔持倉</span>
        </div>
        <div class="table-responsive">
            <table class="table" id="stock-table">
                <thead>
                    <tr>
                        <th style="width: 15%;">股票代號 / 名稱</th>
                        <th style="width: 12%;">交易週期</th>
                        <th style="width: 13%;">持倉起日</th>
                        <th style="width: 12%;">進場價</th>
                        <th style="width: 13%;">最新日期</th>
                        <th style="width: 12%;">最新收盤價</th>
                        <th style="width: 13%;">波段未實現價差</th>
                        <th style="width: 10%;">未平倉天數</th>
                    </tr>
                </thead>
                <tbody id="stock-tbody"></tbody>
            </table>
        </div>
    </div>

    <div class="card card-custom" id="etf-card" style="display: none;">
        <div class="card-header-custom">
            <span>📈 ETF 持倉狀態</span>
            <span class="badge-count" id="etf-count">0 檔持倉</span>
        </div>
        <div class="table-responsive">
            <table class="table" id="etf-table">
                <thead>
                    <tr>
                        <th style="width: 15%;">ETF 代號 / 名稱</th>
                        <th style="width: 12%;">交易週期</th>
                        <th style="width: 13%;">持倉起日</th>
                        <th style="width: 12%;">進場價</th>
                        <th style="width: 13%;">最新日期</th>
                        <th style="width: 12%;">最新收盤價</th>
                        <th style="width: 13%;">波段未實現價差</th>
                        <th style="width: 10%;">未平倉天數</th>
                    </tr>
                </thead>
                <tbody id="etf-tbody"></tbody>
            </table>
        </div>
    </div>

    <div class="card card-custom" id="index-card" style="display: none;">
        <div class="card-header-custom">
            <span>🌐 指數類持倉狀態</span>
            <span class="badge-count" id="index-count">0 檔持倉</span>
        </div>
        <div class="table-responsive">
            <table class="table" id="index-table">
                <thead>
                    <tr>
                        <th style="width: 15%;">指數代號 / 名稱</th>
                        <th style="width: 12%;">交易週期</th>
                        <th style="width: 13%;">持倉起日</th>
                        <th style="width: 12%;">進場價</th>
                        <th style="width: 13%;">最新日期</th>
                        <th style="width: 12%;">最新收盤價</th>
                        <th style="width: 13%;">波段未實現價差</th>
                        <th style="width: 10%;">未平倉天數</th>
                    </tr>
                </thead>
                <tbody id="index-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 計算日期間隔天數的輔助函數
    function calculateDaysBetween(dateStr1, dateStr2) {
        if (!dateStr1 || !dateStr2) return '--';
        const d1 = new Date(dateStr1);
        const d2 = new Date(dateStr2);
        if (isNaN(d1.getTime()) || !isNaN(d2.getTime())) {
            const diffTime = Math.abs(d2 - d1);
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }
        return '--';
    }

    async function loadPositions() {
        try {
            // 1. 同步讀取 股票基本清單
            const resMaster = await fetch('TW/list/stocklist.csv');
            if (!resMaster.ok) throw new Error('無法取得基本母清單 stocklist.csv');
            const txtMaster = await resMaster.text();
            
            const masterMap = {};
            const linesMaster = txtMaster.split(/\r?\n/);
            for (let i = 1; i < linesMaster.length; i++) {
                if (!linesMaster[i].trim()) continue;
                const cols = linesMaster[i].split(',');
                if (cols.length >= 4) {
                    const sym = cols[0].trim();
                    masterMap[sym] = {
                        name: cols[1].trim(),
                        type: cols[2].trim(),
                        industry: cols[3].trim()
                    };
                }
            }

            // 2. 同步讀取 當前未平倉部位清單
            const resPos = await fetch('TW/list/unclosed_positions.csv');
            if (!resPos.ok) throw new Error('無法取得持倉清單 unclosed_positions.csv');
            const txtPos = await resPos.text();

            const stocksList = [];
            const etfsList = [];
            const indexList = []; // 新增：用來存放指數類別的陣列

            const linesPos = txtPos.split(/\r?\n/);
            for (let i = 1; i < linesPos.length; i++) {
                if (!linesPos[i].trim()) continue;
                const cols = linesPos[i].split(',');
                if (cols.length >= 6) {
                    const symbol = cols[0].trim();
                    const timeframe = cols[1].trim();
                    const in_date = cols[2].trim();
                    const entry_close = parseFloat(cols[3]);
                    const latest_date = cols[4].trim();
                    const latest_close = parseFloat(cols[5]);

                    const meta = masterMap[symbol] || { name: '未知個股', type: '普通股', industry: '未知' };
                    const item = { symbol, timeframe, in_date, entry_close, latest_date, latest_close, name: meta.name };

                    // 依據對應類別分流
                    if (meta.type === 'ETF') {
                        etfsList.push(item);
                    } else if (meta.type === '指數') {
                        indexList.push(item); // 歸類至指數
                    } else {
                        stocksList.push(item); // 預設歸類至普通股
                    }
                }
            }

            // 隱藏加載提示
            document.getElementById('loading-div').style.display = 'none';

            // 3. 渲染普通股表格
            if (stocksList.length > 0) {
                document.getElementById('stock-card').style.display = 'block';
                document.getElementById('stock-count').innerText = `${stocksList.length} 檔持倉`;
                renderTableRows('stock-tbody', stocksList);
            }

            // 4. 渲染 ETF 表格
            if (etfsList.length > 0) {
                document.getElementById('etf-card').style.display = 'block';
                document.getElementById('etf-count').innerText = `${etfsList.length} 檔持倉`;
                renderTableRows('etf-tbody', etfsList);
            }

            // 5. 渲染 指數 表格 (全新增)
            if (indexList.length > 0) {
                document.getElementById('index-card').style.display = 'block';
                document.getElementById('index-count').innerText = `${indexList.length} 檔持倉`;
                renderTableRows('index-tbody', indexList);
            }

            // 6. 初始化與觸發所有表格的 Tablesorter
            initAndTriggerTableSorter();

        } catch (err) {
            document.getElementById('loading-div').innerHTML = `<span style=\"color: red; font-weight: bold;\">⚠️ 載入錯誤: ${err.message}</span>`;
            console.error(err);
        }
    }

    // 共用渲染表格 Rows 的函數
    function renderTableRows(tbodyId, dataList) {
        const tbody = document.getElementById(tbodyId);
        tbody.innerHTML = '';
        dataList.forEach(item => {
            const tr = document.createElement('tr');
            const pnl = item.latest_close - item.entry_close;
            let pnlClass = '';
            let pnlSign = '';

            if (pnl > 0) {
                pnlClass = 'pnl-positive';
                pnlSign = '+';
            } else if (pnl < 0) {
                pnlClass = 'pnl-negative';
            }

            const unclosedDays = calculateDaysBetween(item.in_date, item.latest_date);

            tr.innerHTML = `
                <td>
                    <a href="tw_chart.html?symbol=${item.symbol}" class="symbol-link" title="點擊查看 ${item.symbol} ${item.name} 的完整 K 線回測行情" style="flex-direction: row; align-items: center; gap: 8px;">
                        <span class="symbol-text" style="font-size: 16px;">${item.symbol}</span>
                        <span class="symbol-name-text" style="font-size: 16px; font-weight: 700; color: #2c3e50; margin-top: 0;">${item.name}</span>
                    </a>
                </td>
                <td><span class="timeframe-badge">${item.timeframe}</span></td>
                <td style="font-weight: 600; color: #2c3e50;">${item.in_date}</td>
                <td>$${item.entry_close.toFixed(2)}</td>
                <td style="color: var(--text-muted);">${item.latest_date}</td>
                <td style="font-weight: 600;">$${item.latest_close.toFixed(2)}</td>
                <td><span class="${pnlClass}">${pnlSign}${isNaN(pnl) ? '--' : pnl.toFixed(2)}</span></td>
                <td style="font-weight: 600; color: #475569;">${unclosedDays} 天</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 處理所有表格排序機制的初始化與動態更新
    function initAndTriggerTableSorter() {
        const sorterConfig = {
            theme: 'bootstrap_4',
            sortList: [[2, 1]], // 預設使用第三欄 (持倉起日) 進行降序排序
            headers: { 
                0: { sorter: 'text' }, 
                1: { sorter: 'text' }, 
                2: { sorter: 'date' }, 
                3: { sorter: 'digit' }, 
                4: { sorter: 'date' }, 
                5: { sorter: 'digit' }, 
                6: { sorter: 'digit' },
                7: { sorter: 'digit' }
            }
        };

        // 針對現有的各個表格進行初始化或觸發更新
        ['#stock-table', '#etf-table', '#index-table'].forEach(tableId => {
            const $table = $(tableId);
            if ($table.length && $table.find('tbody tr').length > 0) {
                if (!$table.data('tablesorter')) {
                    $table.tablesorter(sorterConfig);
                } else {
                    $table.trigger('update');
                }
            }
        });
    }

    $(document).ready(function() {
        loadPositions();
    });
</script>

</body>
</html>
